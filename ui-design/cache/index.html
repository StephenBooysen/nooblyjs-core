<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache Manager</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }
        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Cache Manager</h1>

        <!-- Get Cache Value -->
        <div class="form-section">
            <h2>Get Cache Value</h2>
            <form id="getCacheForm">
                <div class="form-group">
                    <label for="getKey">Key:</label>
                    <input type="text" class="form-control" id="getKey" placeholder="Enter key" required>
                </div>
                <button type="submit" class="btn btn-primary">Get Value</button>
            </form>
            <div class="mt-3" id="getValueResult"></div>
        </div>

        <!-- Save Cache Value -->
        <div class="form-section">
            <h2>Save Cache Value</h2>
            <form id="saveCacheForm">
                <div class="form-group">
                    <label for="saveKey">Key:</label>
                    <input type="text" class="form-control" id="saveKey" placeholder="Enter key" required>
                </div>
                <div class="form-group">
                    <label for="saveValue">Value:</label>
                    <input type="text" class="form-control" id="saveValue" placeholder="Enter value" required>
                </div>
                <button type="submit" class="btn btn-success">Save Value</button>
            </form>
            <div class="mt-3" id="saveValueResult"></div>
        </div>

        <!-- Delete Cache Value -->
        <div class="form-section">
            <h2>Delete Cache Value</h2>
            <form id="deleteCacheForm">
                <div class="form-group">
                    <label for="deleteKey">Key:</label>
                    <input type="text" class="form-control" id="deleteKey" placeholder="Enter key" required>
                </div>
                <button type="submit" class="btn btn-danger">Delete Value</button>
            </form>
            <div class="mt-3" id="deleteValueResult"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // Placeholder for API calls - replace with actual backend calls
        document.getElementById('getCacheForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const key = document.getElementById('getKey').value;
            // Simulate API call
            document.getElementById('getValueResult').innerHTML = `<div class="alert alert-info">Getting value for key: <strong>${key}</strong>... (Simulated)</div>`;
            // In a real application, you would make an AJAX request here
            // Example: fetch('/api/cache/' + key).then(response => response.json()).then(data => ...)
        });

        document.getElementById('saveCacheForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const key = document.getElementById('saveKey').value;
            const value = document.getElementById('saveValue').value;
            // Simulate API call
            document.getElementById('saveValueResult').innerHTML = `<div class="alert alert-success">Saving key: <strong>${key}</strong> with value: <strong>${value}</strong>... (Simulated)</div>`;
            // Example: fetch('/api/cache', { method: 'POST', body: JSON.stringify({ key, value }) }).then(response => response.json()).then(data => ...)
        });

        document.getElementById('deleteCacheForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const key = document.getElementById('deleteKey').value;
            // Simulate API call
            document.getElementById('deleteValueResult').innerHTML = `<div class="alert alert-warning">Deleting value for key: <strong>${key}</strong>... (Simulated)</div>`;
            // Example: fetch('/api/cache/' + key, { method: 'DELETE' }).then(response => response.json()).then(data => ...)
        });
    </script>
</body>
</html>
