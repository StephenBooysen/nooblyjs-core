<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searching Service - Noobly JS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header" id="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">NJS</div>
                <span>Noobly JS</span>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="documentation.html" class="nav-link">Documentation</a>
                <a href="contact.html" class="nav-link">Contact</a>
                <a href="searching.html" class="nav-link active">Services</a>
            </nav>
            <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>
        </div>
    </header>

    <section class="service-hero">
        <div class="service-content">
            <div class="badge badge-outline" style="margin-bottom: 1rem;">🔍 Discovery</div>
            <h1 class="service-title">Searching Service</h1>
            <p class="service-description">Powerful search functionality with in-memory indexing for fast data retrieval and filtering capabilities.</p>
        </div>
    </section>

    <section id="operations" style="padding: 2rem 0; background-color: hsl(var(--muted) / 0.3);">
        <div class="container">
            <div class="service-grid">
                <div class="card">
                    <div class="card-header">
                        <h3>🔍 Search Data</h3>
                    </div>
                    <div class="card-content">
                        <form id="searchForm">
                            <input type="text" id="searchQuery" placeholder="Search..." required 
                                   style="width: 100%; padding: 0.75rem; border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius)); background: hsl(var(--background)); color: hsl(var(--foreground)); margin-bottom: 1rem;">
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Search</button>
                        </form>
                        <div id="searchResults" style="margin-top: 1rem; max-height: 300px; overflow-y: auto;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <div class="footer-bottom-left">
                    <a href="index.html" class="footer-logo">
                        <div class="footer-logo-icon">NJS</div>
                        <span>Noobly JS</span>
                    </a>
                    <span class="footer-copyright">© 2024 Noobly JS. All rights reserved.</span>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const searchData = [
            { id: 1, title: "User Management", content: "Manage user accounts and permissions" },
            { id: 2, title: "Data Processing", content: "Process and transform data efficiently" },
            { id: 3, title: "API Documentation", content: "Complete API reference and examples" }
        ];

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const query = document.getElementById('searchQuery').value.toLowerCase();
            const results = searchData.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.content.toLowerCase().includes(query)
            );
            
            const resultsHtml = results.map(result => 
                `<div class="card" style="margin-bottom: 0.5rem; padding: 1rem;">
                    <h4>${result.title}</h4>
                    <p style="color: hsl(var(--muted-foreground)); margin: 0;">${result.content}</p>
                </div>`
            ).join('');
            
            document.getElementById('searchResults').innerHTML = results.length > 0 ? resultsHtml : 
                '<div style="text-align: center; color: hsl(var(--muted-foreground)); padding: 2rem;">No results found</div>';
        });
    </script>
</body>
</html>
