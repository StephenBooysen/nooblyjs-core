<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NooblyJS Caching</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="mb-3">
            <label for="inputBox" class="form-label">Enter Cache Key</label>
            <input type="text" class="form-control" id="inputBox" placeholder="Type something...">
        </div>
        <div class="mb-3">
            <label for="textArea" class="form-label">Output</label>
            <textarea class="form-control" id="textArea" rows="5" placeholder="Results will appear here..."></textarea>
        </div>
        <button type="button" class="btn btn-primary mb-3" onclick="putCache(inputBox.value, textArea.value)">Store the Cache</button>
        <button type="button" class="btn btn-primary mb-3" onclick="getCache(inputBox.value).then(data => textArea.value = JSON.stringify(data, null, 2))">Get the Cache</button>
        <button type="button" class="btn btn-primary mb-3" onclick="deleteCache(inputBox.value)">Delete the Cache</button>
    </div>
    <script src="./index.js"></script>
</body>

</html>
