<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queueing Management - Noobly JS Admin</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@4.15.5/swagger-ui.css">
    <style>
        :root {
            --primary-color: #1976d2;
            --surface-color: #ffffff;
            --surface-variant: #f5f5f5;
            --background-color: #fafafa;
            --error-color: #d32f2f;
            --success-color: #388e3c;
            --text-primary: #212121;
            --text-secondary: #757575;
            --text-hint: #9e9e9e;
            --divider-color: #e0e0e0;
            --outline-color: #616161;
            --surface-tint: rgba(25, 118, 210, 0.08);
            --elevation-1: 0px 1px 3px rgba(0, 0, 0, 0.12), 0px 1px 2px rgba(0, 0, 0, 0.24);
            --elevation-2: 0px 3px 6px rgba(0, 0, 0, 0.16), 0px 3px 6px rgba(0, 0, 0, 0.23);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.5; color: var(--text-primary); background: var(--background-color); min-height: 100vh; }
        .header { background: var(--surface-color); box-shadow: var(--elevation-1); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 64px; }
        .header-container { display: flex; align-items: center; justify-content: space-between; height: 100%; padding: 0 24px; }
        .logo { display: flex; align-items: center; text-decoration: none; color: var(--text-primary); font-weight: 500; font-size: 1.25rem; }
        .logo-icon { width: 40px; height: 40px; background: var(--primary-color); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 600; margin-right: 12px; }
        .admin-container { display: flex; min-height: 100vh; margin-top: 64px; background: var(--background-color); }
        .admin-sidebar { width: 280px; background: var(--surface-color); border-right: 1px solid var(--divider-color); padding: 24px 0; position: fixed; height: calc(100vh - 64px); overflow-y: auto; box-shadow: var(--elevation-1); }
        .admin-nav { list-style: none; padding: 0; margin: 0; }
        .admin-nav-item { padding: 0; margin: 0 16px; }
        .admin-nav-link { display: block; padding: 12px 16px; color: var(--text-secondary); text-decoration: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 500; font-size: 0.875rem; border-radius: 12px; position: relative; overflow: hidden; }
        .admin-nav-link:hover { color: var(--primary-color); background: var(--surface-tint); }
        .admin-nav-link.active { color: var(--primary-color); background: var(--surface-tint); }
        .admin-content { flex: 1; margin-left: 280px; padding: 32px; }
        .admin-header { margin-bottom: 32px; }
        .admin-title { font-size: 2rem; font-weight: 400; color: var(--text-primary); margin-bottom: 8px; line-height: 2.5rem; }
        .admin-subtitle { color: var(--text-secondary); font-weight: 400; font-size: 1rem; line-height: 1.5rem; }
        .queueing-operations { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .queueing-card { background: var(--surface-color); border-radius: 12px; padding: 24px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--elevation-1); }
        .queueing-card:hover { box-shadow: var(--elevation-2); }
        .queueing-card h3 { color: var(--text-primary); font-size: 1.375rem; font-weight: 400; margin-bottom: 24px; line-height: 1.75rem; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; color: var(--text-primary); font-weight: 500; margin-bottom: 8px; font-size: 0.875rem; line-height: 1.25rem; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid var(--outline-color); border-radius: 8px; background: var(--surface-color); color: var(--text-primary); font-size: 1rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .form-input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px var(--surface-tint); }
        .form-input::placeholder { color: var(--text-hint); }
        .form-textarea { width: 100%; padding: 12px 16px; border: 1px solid var(--outline-color); border-radius: 8px; background: var(--surface-color); color: var(--text-primary); font-size: 1rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 80px; resize: vertical; }
        .form-textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px var(--surface-tint); }
        .form-textarea::placeholder { color: var(--text-hint); }
        .form-button { width: 100%; padding: 10px 24px; background: var(--primary-color); color: white; border: none; border-radius: 20px; font-weight: 500; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; letter-spacing: 1.25px; font-size: 0.875rem; font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 40px; position: relative; overflow: hidden; box-shadow: var(--elevation-1); }
        .form-button:hover { box-shadow: var(--elevation-2); }
        .result-area { background: var(--surface-variant); border: 1px solid var(--divider-color); border-radius: 8px; padding: 16px; margin-top: 16px; color: var(--text-secondary); font-size: 0.875rem; font-weight: 400; min-height: 60px; white-space: pre-wrap; font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .result-success { color: var(--success-color); background: rgba(56, 142, 60, 0.08); border-color: rgba(56, 142, 60, 0.2); }
        .result-error { color: var(--error-color); background: rgba(211, 47, 47, 0.08); border-color: rgba(211, 47, 47, 0.2); }
        .form-helper { color: var(--text-secondary); font-size: 0.75rem; margin-top: 4px; line-height: 1.2; }
        #swagger-ui { margin-top: 32px; }
        .swagger-card { background: var(--surface-color); border-radius: 12px; padding: 24px; box-shadow: var(--elevation-1); }
        @media (max-width: 768px) { .admin-sidebar { width: 240px; } .admin-content { margin-left: 240px; padding: 24px 16px; } .queueing-operations { grid-template-columns: 1fr; gap: 16px; } }
        @media (max-width: 600px) { .admin-sidebar { width: 100%; position: relative; height: auto; box-shadow: none; border-right: none; border-bottom: 1px solid var(--divider-color); } .admin-content { margin-left: 0; padding: 16px; } .admin-container { flex-direction: column; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="#" class="logo">
                <div class="logo-icon">N</div>
                <span>Noobly JS Admin</span>
            </a>
        </div>
    </header>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <nav class="admin-nav">
                <div class="admin-nav-item"><a href="/services/caching" class="admin-nav-link">Caching</a></div>
                <div class="admin-nav-item"><a href="/services/dataserve" class="admin-nav-link">Data</a></div>
                <div class="admin-nav-item"><a href="/services/filing" class="admin-nav-link">Filing</a></div>
                <div class="admin-nav-item"><a href="/services/logging" class="admin-nav-link">Logging</a></div>
                <div class="admin-nav-item"><a href="/services/measuring" class="admin-nav-link">Measuring</a></div>
                <div class="admin-nav-item"><a href="/services/notifying" class="admin-nav-link">Notifying</a></div>
                <div class="admin-nav-item"><a href="/services/queueing" class="admin-nav-link active">Queueing</a></div>
                <div class="admin-nav-item"><a href="/services/scheduling" class="admin-nav-link">Scheduling</a></div>
                <div class="admin-nav-item"><a href="/services/searching" class="admin-nav-link">Searching</a></div>
                <div class="admin-nav-item"><a href="/services/workflow" class="admin-nav-link">Workflow</a></div>
                <div class="admin-nav-item"><a href="/services/working" class="admin-nav-link">Working</a></div>
            </nav>
        </aside>
        <main class="admin-content">
            <div class="admin-header">
                <h1 class="admin-title">Queue Management</h1>
                <p class="admin-subtitle">Enqueue, dequeue and manage tasks in queue</p>
            </div>
            <div class="queueing-operations">
                <div class="queueing-card">
                    <h3>Enqueue Task</h3>
                    <form id="enqueueForm">
                        <div class="form-group">
                            <label for="enqueueTask" class="form-label">Task Data</label>
                            <textarea id="enqueueTask" name="task" class="form-textarea" placeholder="Enter task data" required></textarea>
                            <div class="form-helper">Task data to add to queue</div>
                        </div>
                        <button type="submit" class="form-button">Enqueue Task</button>
                    </form>
                    <div id="enqueueResult" class="result-area"></div>
                </div>
                <div class="queueing-card">
                    <h3>Dequeue Task</h3>
                    <form id="dequeueForm">
                        <button type="submit" class="form-button">Dequeue Task</button>
                    </form>
                    <div class="form-group">
                        <label for="dequeueValue" class="form-label">Dequeued Task</label>
                        <textarea id="dequeueValue" class="form-textarea" placeholder="Dequeued task will appear here" readonly></textarea>
                    </div>
                    <div id="dequeueResult" class="result-area"></div>
                </div>
                <div class="queueing-card">
                    <h3>Queue Size</h3>
                    <form id="sizeForm">
                        <button type="submit" class="form-button">Get Queue Size</button>
                    </form>
                    <div id="sizeResult" class="result-area"></div>
                </div>
                <div class="queueing-card">
                    <h3>Service Status</h3>
                    <form id="statusForm">
                        <button type="submit" class="form-button">Check Status</button>
                    </form>
                    <div id="statusResult" class="result-area"></div>
                </div>
            </div>
            <div class="swagger-card">
                <h2 style="margin-bottom: 24px; font-size: 1.75rem; font-weight: 400;">API Documentation</h2>
                <div id="swagger-ui"></div>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/swagger-ui-dist@4.15.5/swagger-ui-bundle.js"></script>
    <script>
        SwaggerUIBundle({
            url: '',
            spec: {
                "openapi": "3.0.0",
                "info": { "title": "NooblyJS Core - Queueing Service API", "version": "1.0.0", "description": "RESTful API for the queueing service in NooblyJS Core framework" },
                "servers": [{ "url": "/services/queueing/api", "description": "Queueing Service API" }],
                "paths": {
                    "/enqueue": { "post": { "summary": "Enqueue a task", "requestBody": { "required": true, "content": { "application/json": { "schema": { "type": "object", "properties": { "task": { "type": "string" } }, "required": ["task"] } } } }, "responses": { "200": { "description": "Task enqueued successfully" } } } },
                    "/dequeue": { "get": { "summary": "Dequeue a task", "responses": { "200": { "description": "Task dequeued successfully" } } } },
                    "/size": { "get": { "summary": "Get queue size", "responses": { "200": { "description": "Queue size retrieved" } } } },
                    "/status": { "get": { "summary": "Check service status", "responses": { "200": { "description": "Service is running" } } } }
                }
            },
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.presets.standalone],
            plugins: [SwaggerUIBundle.plugins.DownloadUrl]
        });

        const enqueueForm = document.getElementById('enqueueForm');
        const dequeueForm = document.getElementById('dequeueForm');
        const sizeForm = document.getElementById('sizeForm');
        const statusForm = document.getElementById('statusForm');

        function showResult(resultDivId, message, type) {
            const resultDiv = document.getElementById(resultDivId);
            resultDiv.textContent = message;
            resultDiv.className = `result-area${type === 'success' ? ' result-success' : type === 'error' ? ' result-error' : ''}`;
        }

        enqueueForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const task = document.getElementById('enqueueTask').value;
            const body = { task };
            await executeApiCall('ENQUEUE', null, body, 'enqueueResult');
        });

        dequeueForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            await executeApiCall('DEQUEUE', null, null, 'dequeueResult');
        });

        sizeForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            await executeApiCall('SIZE', null, null, 'sizeResult');
        });

        statusForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            await executeApiCall('STATUS', null, null, 'statusResult');
        });

        async function executeApiCall(operation, params, body, resultDivId) {
            let url, method;
            switch (operation) {
                case 'ENQUEUE': url = `/services/queueing/api/enqueue`; method = 'POST'; break;
                case 'DEQUEUE': url = `/services/queueing/api/dequeue`; method = 'GET'; break;
                case 'SIZE': url = `/services/queueing/api/size`; method = 'GET'; break;
                case 'STATUS': url = `/services/queueing/api/status`; method = 'GET'; break;
            }
            
            try {
                const options = { method: method, headers: { 'Content-Type': 'application/json' } };
                if (body !== undefined && body !== null) options.body = JSON.stringify(body);
                
                const response = await fetch(url, options);
                const responseText = await response.text();
                let responseData;
                try { responseData = JSON.parse(responseText); } catch (e) { responseData = responseText; }
                
                if (response.ok) {
                    if (operation === 'DEQUEUE') {
                        const valueTextarea = document.getElementById('dequeueValue');
                        valueTextarea.value = JSON.stringify(responseData, null, 2);
                        showResult(resultDivId, 'Success: Task dequeued successfully', 'success');
                    } else {
                        showResult(resultDivId, `Success: ${JSON.stringify(responseData, null, 2)}`, 'success');
                    }
                } else {
                    if (operation === 'DEQUEUE') document.getElementById('dequeueValue').value = '';
                    showResult(resultDivId, `Error ${response.status}: ${responseData}`, 'error');
                }
            } catch (error) {
                showResult(resultDivId, `Network Error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
